  watch_min_score: 60

rules:
  - id: constitution_no_high_position
    name: 不做高位股
    group: constitution
    enabled: true
    weight: 0
    hard_block: true
    params:
      max_price_to_high_ratio: 0.5

  - id: dengzhan_low_position_limit_up
    name: 灯盏策略-低位涨停候选
    group: strategy
    enabled: true
    weight: 25
    hard_block: false
