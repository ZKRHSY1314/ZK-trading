      max_price_to_high_ratio: 0.5
      min_limit_up_pct: 9.9
      max_pb: 6.0
      min_market_cap_billion: 50
      max_market_cap_billion: 200

  - id: dengzhan_forced_divergence
    name: 灯盏策略-强制分歧点
    group: strategy
    enabled: true
    weight: 20
    hard_block: false
    params:
      min_volume_ratio: 1.5
      ma_window: 5

  - id: risk_no_chasing_after_big_rise
    name: 大涨后轻仓
    group: risk
    enabled: true
    weight: 0
    hard_block: false
    params:
      big_rise_pct: 20
      max_position_ratio: 0.1
